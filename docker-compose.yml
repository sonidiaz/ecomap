version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecomap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecomap
      POSTGRES_PASSWORD: ecomap_dev_password
      POSTGRES_DB: ecomap_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
